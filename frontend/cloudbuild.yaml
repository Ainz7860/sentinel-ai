steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '--build-arg', 'VITE_API_BASE_URL=${_VITE_API_BASE_URL}',
      '-t', 'us-central1-docker.pkg.dev/${PROJECT_ID}/sentinel-ai-repo/frontend:latest',
      '.'
    ]
images:
  - 'us-central1-docker.pkg.dev/${PROJECT_ID}/sentinel-ai-repo/frontend:latest'
substitutions:
  _VITE_API_BASE_URL: 'http://localhost:8000'
